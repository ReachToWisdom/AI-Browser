name: Release Build

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  create-release:
    runs-on: ubuntu-latest
    outputs:
      release_id: ${{ steps.create-release.outputs.result }}
      release_upload_url: ${{ steps.create-release.outputs.upload_url }}
    steps:
      - uses: actions/checkout@v4
      - name: Create Release
        id: create-release
        uses: actions/github-script@v7
        with:
          script: |
            const { data } = await github.rest.repos.createRelease({
              owner: context.repo.owner,
              repo: context.repo.repo,
              tag_name: `${context.ref.replace('refs/tags/', '')}`,
              name: `AI Browser ${context.ref.replace('refs/tags/', '')}`,
              body: `## 변경사항
            - **탭 개수 제한 해소**: Lazy WebView 생성으로 14개 이상 탭 추가 가능
            - **재시작 시 탭 복원 개선**: 마지막 활성 탭 기억 및 복원
            - 시작 속도 향상 (활성 탭만 즉시 로드, 나머지 탭 클릭 시 로드)

            **제작자**: 혜통

            ## 다운로드
            - **Windows**: AI-Browser_*_x64-setup.exe
            - **macOS (Apple Silicon)**: AI-Browser_*_aarch64.dmg
            - **macOS (Intel)**: AI-Browser_*_x64.dmg

            ## 자동 업데이트
            이전 버전 사용자는 앱 실행 시 자동으로 업데이트 알림을 받게 됩니다.`,
              draft: false,
              prerelease: false
            })
            return data.id

  build-tauri:
    needs: create-release
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: 'macos-latest'
            target: 'aarch64-apple-darwin'
          - platform: 'macos-latest'
            target: 'x86_64-apple-darwin'
          - platform: 'windows-latest'
            target: 'x86_64-pc-windows-msvc'

    runs-on: ${{ matrix.platform }}
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Install dependencies
        run: npm install

      - name: Build Tauri app
        run: |
          npm run tauri build -- --target ${{ matrix.target }}

      - name: Upload Release Asset (macOS)
        if: matrix.platform == 'macos-latest'
        uses: softprops/action-gh-release@v1
        with:
          files: src-tauri/target/${{ matrix.target }}/release/bundle/dmg/*.dmg
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload Release Asset (Windows)
        if: matrix.platform == 'windows-latest'
        uses: softprops/action-gh-release@v1
        with:
          files: |
            src-tauri/target/${{ matrix.target }}/release/bundle/nsis/*.exe
            src-tauri/target/${{ matrix.target }}/release/bundle/msi/*.msi
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
