name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: 'macos-latest'
            args: '--target aarch64-apple-darwin'
          - platform: 'macos-latest'
            args: '--target x86_64-apple-darwin'
          - platform: 'windows-latest'
            args: ''

    runs-on: ${{ matrix.platform }}
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.platform == 'macos-latest' && 'aarch64-apple-darwin,x86_64-apple-darwin' || '' }}

      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: './src-tauri -> target'

      - name: Install frontend dependencies
        run: npm install

      - name: Build and release Tauri app
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tagName: ${{ github.ref_name }}
          releaseName: 'AI Browser ${{ github.ref_name }}'
          releaseBody: |
            ## 다운로드

            ### Windows
            - **AI.Browser_*_x64-setup.exe** — 설치 파일
            - **ai-browser.exe** — 실행 파일 (portable)

            ### macOS
            - **AI.Browser_*_aarch64.dmg** — Apple Silicon 설치 파일
            - **AI.Browser_*_x64.dmg** — Intel 설치 파일
            - **.app.tar.gz** — 실행 파일 (Tauri updater 형식)

            > **macOS 최초 실행 안내**
            > 앱이 Apple Developer ID로 서명되지 않아 "손상됨" 또는 "확인되지 않은 개발자" 경고가 뜰 수 있습니다.
            > 다음 중 한 가지 방법을 사용하세요:
            > 1. Finder에서 앱을 **우클릭 → 열기** → 경고창에서 "열기" 클릭
            > 2. 터미널에서 한 줄 실행: `xattr -cr "/Applications/AI Browser.app"`

            ---
            개발자: 정성광
          releaseDraft: false
          prerelease: false
          args: ${{ matrix.args }}
